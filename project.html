<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <title>Hugo Charlet — Design</title>
    <link rel="stylesheet" href="navbarstyle.css">
    <link rel="stylesheet" href="csspages.css">
    <link rel="stylesheet" href="variables.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="projects-data.js"></script>
    <script>
        (function () {
            const key = new URLSearchParams(window.location.search).get('p') || 'tomeo';
            const p   = PROJECTS[key];
            if (p && (p.models.length > 0 || p.configurator)) {
                const s = document.createElement('script');
                s.type = 'module';
                s.src  = 'https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js';
                document.head.appendChild(s);
            }
        })();
    </script>
    <style>
        /* ── Barre de navigation projet ── */
        .proj-top-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            /* hero-section left edge = 19vw depuis viewport left */
            left: calc(var(--margin-general) + 10px - 19vw);
            width: calc(100vw - 2 * (var(--margin-general) + 10px));
            z-index: 2100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
        }

        .proj-top-nav-link {
            pointer-events: all;
        }

        .proj-top-nav-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: "IBM Plex Mono", monospace;
            font-style: italic;
            font-weight: 400;
            font-size: 11px;
            text-transform: lowercase;
            color: #afafaf;
            text-decoration: none;
            transition: transform 0.3s ease, color 0.3s ease;
            cursor: pointer;
        }

        .proj-top-nav-link:hover { color: #303030; }

        .proj-top-nav-link svg {
            flex-shrink: 0;
            stroke: currentColor;
            fill: currentColor;
        }

        .proj-top-nav-link.prev:hover { transform: translateX(-3px); }
        .proj-top-nav-link.next:hover { transform: translateX(3px); }
    </style>
    <style>
        /* ── Layout éditorial ── */
        .editorial-layout {
            margin-top: 125px;
        }

        /* ── Conteneur commun centré ── */
        .page-container {
            width: 62vw;
            margin: 0 auto;
        }

        /* ── Hero ── */
        .hero-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .hero-video-wrap {
            width: 100%;
            position: relative;
            cursor: pointer;
            background: #000;
        }

        .hero-video {
            width: 100%;
            height: auto;
            display: block;
        }

        .video-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.35);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: #fff;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .hero-video-wrap:hover .video-play-btn { opacity: 1; }
        .video-play-btn:hover { background: rgba(0,0,0,0.6); }

        /* ── Section éditoriale (texte + modèles) ── */
        .editorial-row {
            display: flex;
            flex-direction: column;
            padding: 52px 0 30px;
            padding-right: 25%;
        }

        .editorial-col-left {
            margin-bottom: 28px;
        }

        .editorial-col-left h1 { margin: 0 0 8px; }
        .editorial-col-left h2 { margin: 0; }

        .editorial-col-right p {
            margin: 0 0 10px;
        }

        .editorial-models {
            margin-top: 40px;
        }

        /* ── Barre process toggle ── */
        .process-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: "IBM Plex Mono", monospace;
            font-style: italic;
            font-size: 10px;
            color: #aaa;
            letter-spacing: 0.08em;
            padding: 10px var(--margin-general);
            border: none;
            background: none;
            cursor: pointer;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            transition: color 0.2s;
            margin-top: -1px;
        }
        .process-toggle:hover { color: #303030; background: #f5f5f5; }
        .process-toggle svg {
            flex-shrink: 0;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .process-toggle:hover svg { opacity: 1; }
        .process-toggle.open svg { transform: rotate(90deg); opacity: 0.5; }
        .process-toggle.icon-left {
            justify-content: flex-start;
            position: relative;
            padding-left: 20px;
        }
        .process-toggle.icon-left svg {
            position: absolute;
            left: 4px;
            top: 50%;
            transform: translateY(-50%);
        }
        .process-toggle.icon-left.open svg {
            transform: translateY(-50%) rotate(90deg);
        }

        .expand-wrap {
            display: grid;
            grid-template-rows: 1fr;
            margin-top: -1px;
            transition: grid-template-rows 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.35s ease;
            opacity: 1;
        }
        .expand-wrap.collapsed {
            grid-template-rows: 0fr;
            opacity: 0;
        }
        .expand-inner {
            overflow: hidden;
            min-height: 0;
        }

        .process-inline-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-content: start;
        }
        .process-inline-grid img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* ── Galerie ── */
        .gallery-section {
            margin: 0 auto 80px;
        }

        .gallery-section-header {
            font-family: "IBM Plex Mono", monospace;
            font-style: italic;
            font-size: 10px;
            color: #aaa;
            letter-spacing: 0.08em;
            padding: 10px 0;
            align-self: flex-start;
        }

        .editorial-gallery-grid {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 38vw;
            margin: 0 auto;
        }

        .gallery-img + .gallery-img {
            margin-top: 80px;
        }

        .gallery-img {
            display: block;
            width: 100%;
            height: auto;
            opacity: 0;
            transition: opacity 2s ease;
        }
        .gallery-img.visible { opacity: 1; }

        /* ── Model viewer overlay ── */
        #modelContainer {
            display: none;
            position: fixed;
            top: 125px;
            left: 50%;
            transform: translateX(-50%);
            width: 60vw;
            height: calc(100vh - 125px);
            background: rgba(255, 255, 255, 0.96);
            z-index: 3000;
            padding: 0;
            box-sizing: border-box;
        }
        #modelContainer.show { display: block; }
        #modelContainer model-viewer {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .page-container {
                width: 92vw;
            }

            .editorial-row {
                padding: 36px 0 40px;
                padding-right: 0;
            }

            .gallery-img + .gallery-img {
                margin-top: 5px;
            }

            .editorial-gallery-grid {
                width: 100%;
            }

            #modelContainer {
                width: 100vw !important;
                max-width: 100vw !important;
                height: 100vh !important;
                left: 0 !important;
                right: auto !important;
                top: 0 !important;
                transform: none !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            #modelContainer model-viewer {
                width: 100vw !important;
                height: 100vh !important;
            }
        }
    </style>
</head>
<body>

<header>
    <div id="menu-placeholder"></div>
</header>

<div id="app">
    <div class="editorial-layout">
    <div class="page-container">

        <!-- ── 1. Hero image / vidéo ── -->
        <section class="hero-section" style="position: relative;">
            <div id="svgmenupages-placeholder"></div>
            <template v-if="videoExists">
                <div class="hero-video-wrap" @click="toggleVideoPlay">
                    <video ref="videoRef" class="hero-video" :src="videoSrc" autoplay muted loop playsinline></video>
                    <button class="video-play-btn">
                        <svg v-if="videoPlaying" width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="1.5" y="1" width="3" height="9" rx="0.5" fill="currentColor"/>
                            <rect x="6.5" y="1" width="3" height="9" rx="0.5" fill="currentColor"/>
                        </svg>
                        <svg v-else width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 1.5l8 4L2 9.5V1.5z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </template>
            <template v-else-if="mainImageExists">
                <img :src="mainImageSrc" class="hero-image"
                     :alt="`${project.title} — Hugo Charlet`" />
            </template>
        </section>

        <!-- ── 2. Section éditoriale : texte + modèles 3D ── -->
        <section class="editorial-section">
            <div class="editorial-row">

                <!-- Colonne gauche : titre ── -->
                <div class="editorial-col-left">
                    <h1 class="Title">{{ project.title }}</h1>
                    <h2 class="Subtitle">{{ project.subtitle }}</h2>
                </div>

                <!-- Colonne droite : description + modèles ── -->
                <div class="editorial-col-right">
                    <main class="textebox-container">
                        <p v-if="project.dimensions" class="texte">{{ project.dimensions }}</p>
                        <p class="texte">{{ project.description }}</p>
                    </main>

                    <div v-if="hasModelsSection" class="editorial-models">
                        <div class="sousmenu-wrapper" style="margin-top: 0;">
                            <div v-for="model in models" :key="model.src" class="icon-container">
                                <a href="#" class="icon-link" @click.prevent.stop="openModel(model.src)">
                                    <img src="3DICON.svg" alt="Open Model Viewer" class="icon-item">
                                    <div class="texte texte-icon">{{ model.label }}</div>
                                </a>
                            </div>
                            <div v-if="project.configurator" class="icon-container">
                                <a :href="project.configurator" class="icon-link">
                                    <img src="config.svg" alt="Configurator" class="icon-item">
                                    <div class="texte texte-icon">3D configurator</div>
                                </a>
                            </div>
                            <div v-if="project.download" class="icon-container">
                                <a :href="project.download" class="icon-link" download>
                                    <img src="DL.svg" alt="Download" class="icon-item">
                                    <div class="texte texte-icon">HD images</div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Process (dépliable) ── -->
            <template v-if="processExists">
                <button class="process-toggle icon-left" :class="{ open: processVisible }" @click="toggleProcess">
                    <svg width="7" height="9" viewBox="0 0 7 9" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1.4 1.8C1.4 1.2 2 0.9 2.5 1.3L5.6 3.5C6.1 3.9 6.1 4.7 5.6 5.1L2.5 7.3C2 7.7 1.4 7.4 1.4 6.8Z" fill="currentColor"/>
                    </svg>
                    more details about the process
                </button>
                <div class="expand-wrap" :class="{ collapsed: !processVisible }">
                    <div class="expand-inner">
                        <div class="process-inline-grid">
                            <img v-for="(src, i) in processImages" :key="i" :src="src" :alt="`${project.title} process — Hugo Charlet`" />
                        </div>
                    </div>
                </div>
            </template>
        </section>
        <div style="height: 30px;"></div>

        <!-- ── 3. Galerie photos ── -->
        <section class="gallery-section">
            <div class="editorial-gallery-grid" ref="galleryRef">
                <div class="gallery-section-header">photos</div>
                <img
                    v-for="(img, i) in images"
                    :key="i"
                    :src="img.src"
                    class="gallery-img"
                    :class="{ visible: img.visible }"
                    :alt="`${project.title} — Hugo Charlet`"
                    :loading="i === 0 ? 'eager' : 'lazy'"
                />
            </div>
        </section>

    </div><!-- /page-container -->
    </div><!-- /editorial-layout -->

    <!-- ── Model viewer overlay ── -->
    <div id="modelContainer" ref="modelContainer" :class="{ show: modelVisible }" @click.self="closeModel">
        <button class="close-button" @click="closeModel">
            <img src="crosss.svg" alt="Close">
        </button>
        <model-viewer
            ref="modelViewer"
            :src="currentModelSrc"
            autoplay loading="eager"
            ar ar-modes="webxr scene-viewer quick-look" ar-status="not-presenting"
            auto-rotate bounds="tight" rotation-per-second="1deg"
            environment-image="glb/studio.hdr" exposure="0.7"
            camera-controls interpolation-decay="200" shadow-intensity="1"
            interaction-prompt="none" camera-orbit="-40deg 82deg 12m"
            min-camera-orbit="auto 40deg a">
        </model-viewer>
    </div>

    <div id="loader" v-show="loading">
        <div class="spinner"></div>
    </div>
</div>

<script>
// PROJECTS and PROJECT_ORDER sont chargés depuis projects-data.js

// ── Résolution du projet depuis l'URL ───────────────────────────────────────
const urlParams   = new URLSearchParams(window.location.search);
const lastSegment = window.location.pathname.split('/').filter(Boolean).pop() || '';
const fromPath    = lastSegment.endsWith('.html') ? null : lastSegment;
const projectKey  = urlParams.get('p') || fromPath || 'tomeo';
const project     = PROJECTS[projectKey] || {
    title: projectKey.toUpperCase(), subtitle: '', description: 'Project coming soon.',
    dimensions: null, pageTitle: projectKey, ogDescription: '', ogImage: '',
    models: [], configurator: null, download: null
};

// ── Meta tags ───────────────────────────────────────────────────────────────
document.title = project.pageTitle;
document.querySelector('meta[name="description"]').setAttribute('content', project.ogDescription);
document.querySelector('meta[property="og:description"]').setAttribute('content', project.ogDescription);
document.querySelector('meta[property="og:image"]').setAttribute('content', project.ogImage);

const canonical = document.createElement('link');
canonical.rel = 'canonical';
canonical.href = `https://hugocharlet.com/${projectKey}`;
document.head.appendChild(canonical);

// ── Navigation précédent / suivant ──────────────────────────────────────────
const navsvg = document.getElementById("svgmenupages-placeholder");
(function () {
    const idx      = PROJECT_ORDER.indexOf(projectKey);
    const prevKey  = idx > 0 ? PROJECT_ORDER[idx - 1] : PROJECT_ORDER[PROJECT_ORDER.length - 1];
    const nextKey  = idx < PROJECT_ORDER.length - 1 ? PROJECT_ORDER[idx + 1] : PROJECT_ORDER[0];
    const prevTitle = (PROJECTS[prevKey] || {}).title || prevKey.toUpperCase();
    const nextTitle = (PROJECTS[nextKey] || {}).title || nextKey.toUpperCase();
    navsvg.innerHTML = `
        <nav class="proj-top-nav">
            <a class="proj-top-nav-link prev" href="/${prevKey}">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 8.25 3 12m0 0 3.75 3.75M3 12H12" />
                </svg>
                <span>${prevTitle}</span>
            </a>
            <a class="proj-top-nav-link next" href="/${nextKey}">
                <span>${nextTitle}</span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25 21 12m0 0-3.75 3.75M21 12H12" />
                </svg>
            </a>
        </nav>`;
})();

// ── Vue app ──────────────────────────────────────────────────────────────────
const { createApp, ref, reactive, onMounted, nextTick } = Vue;

const app = createApp({
    setup() {
        const newUrl       = `pages/${projectKey}/`;
        const videoSrc     = `${newUrl}main-video.mp4`;
        const mainImageSrc = `${newUrl}main.jpg`;

        const models           = project.models;
        const hasModelsSection = models.length > 0 || !!project.configurator || !!project.download;

        const modelVisible    = ref(false);
        const currentModelSrc = ref(models.length > 0 ? models[0].src : '');
        const loading         = ref(true);
        const images          = reactive([]);
        const processImages   = reactive([]);
        const processVisible  = ref(false);
        const processLoaded   = ref(false);
        const videoExists     = ref(false);
        const mainImageExists = ref(false);
        const processExists   = ref(false);
        const videoRef        = ref(null);
        const videoPlaying    = ref(true);
        const modelContainer  = ref(null);
        const galleryRef      = ref(null);

        function openModel(src) {
            currentModelSrc.value = src;
            modelVisible.value = !modelVisible.value;
        }

        function closeModel() {
            modelVisible.value = false;
        }

        function toggleVideoPlay() {
            const v = videoRef.value;
            if (!v) return;
            if (videoPlaying.value) { v.pause(); videoPlaying.value = false; }
            else { v.play(); videoPlaying.value = true; }
        }

        async function toggleProcess() {
            if (!processVisible.value) {
                if (!processLoaded.value) {
                    processLoaded.value = true;
                    const base = `${newUrl}process/`;
                    const srcs = await Promise.all(
                        Array.from({ length: 30 }, (_, i) => new Promise(resolve => {
                            const img = new Image();
                            img.src = `${base}${i + 1}.jpg`;
                            img.onload  = () => resolve(img.src);
                            img.onerror = () => resolve(null);
                        }))
                    );
                    srcs.forEach(src => { if (src) processImages.push(src); });
                }
                processVisible.value = true;
            } else {
                processVisible.value = false;
            }
        }

        onMounted(async () => {
            document.addEventListener('click', (e) => {
                if (modelVisible.value && modelContainer.value && !modelContainer.value.contains(e.target)) {
                    modelVisible.value = false;
                }
            });

            // ── Détection vidéo / image principale ──
            fetch(`${newUrl}main-video.mp4`, { method: 'HEAD' })
                .then(async r => {
                    if (r.ok) {
                        videoExists.value = true;
                    } else {
                        fetch(`${newUrl}main.jpg`, { method: 'HEAD' })
                            .then(r2 => { if (r2.ok) mainImageExists.value = true; })
                            .catch(() => {});
                    }
                })
                .catch(() => {});

            // ── Détection dossier process ──
            new Promise(resolve => {
                const img = new Image();
                img.onload  = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = `${newUrl}process/1.jpg`;
            }).then(exists => { processExists.value = exists; });

            // ── Chargement galerie ──
            const mediaSrcs = await Promise.all(
                Array.from({ length: 30 }, (_, i) => new Promise(resolve => {
                    const img = new Image();
                    img.src = `${newUrl}${i + 1}.jpg`;
                    img.onload  = () => resolve(img.src);
                    img.onerror = () => resolve(null);
                }))
            );
            mediaSrcs.forEach(src => { if (src) images.push({ src, visible: false }); });
            loading.value = false;

            await nextTick();

            // ── Fade-in images (viewport comme root) ──
            const galleryObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const idx = parseInt(entry.target.dataset.idx);
                    if (entry.isIntersecting) {
                        images[idx].visible = true;
                    } else if (entry.rootBounds && entry.boundingClientRect.top >= entry.rootBounds.bottom) {
                        images[idx].visible = false;
                    }
                });
            }, { root: null, threshold: 0.05 });

            if (galleryRef.value) {
                galleryRef.value.querySelectorAll('.gallery-img').forEach((el, i) => {
                    el.dataset.idx = i;
                    galleryObserver.observe(el);
                });
            }
        });

        return {
            project, models, hasModelsSection, videoSrc, mainImageSrc, mainImageExists,
            modelVisible, currentModelSrc, loading,
            images, processImages, processVisible, processExists,
            videoExists, videoRef, videoPlaying, modelContainer, galleryRef,
            openModel, closeModel, toggleProcess, toggleVideoPlay,
        };
    }
});

app.config.compilerOptions.isCustomElement = tag => tag === "model-viewer";
app.mount("#app");
</script>
<script src="navbar.js"></script>
</body>
</html>

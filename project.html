<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <title>Hugo Charlet — Design</title>
    <link rel="stylesheet" href="navbarstyle.css">
    <link rel="stylesheet" href="csspages.css">
    <link rel="stylesheet" href="variables.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="projects-data.js"></script>
    <script>
        (function () {
            const key = new URLSearchParams(window.location.search).get('p') || 'tomeo';
            const p   = PROJECTS[key];
            if (p && (p.models.length > 0 || p.configurator)) {
                const s = document.createElement('script');
                s.type = 'module';
                s.src  = 'https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js';
                document.head.appendChild(s);
            }
        })();
    </script>
    <style>
        /* ── Barre de navigation projet (haut) ── */
        .proj-top-nav {
            position: fixed;
            top: 90px;
            left: 0;
            width: 100%;
            height: 35px;
            z-index: 2100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2vw;
            box-sizing: border-box;
            background: #fff;
        }

        .proj-top-nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: "IBM Plex Mono", monospace;
            font-style: italic;
            font-weight: 300;
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #aaa;
            text-decoration: none;
            transition: color 0.22s;
            cursor: pointer;
        }

        .proj-top-nav-link:hover { color: #282828; }

        .proj-top-nav-link svg {
            flex-shrink: 0;
            transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .proj-top-nav-link.prev:hover svg { transform: translateX(-4px); }
        .proj-top-nav-link.next:hover svg { transform: translateX(4px); }
    </style>
    <style>
        .page-layout {
            margin-top: 125px;
            margin-left: 2vw;
            margin-right: 2vw;
            display: flex;
            align-items: flex-start;
        }
        .left-col {
            width: 52%;
            flex-shrink: 0;
            position: sticky;
            top: 125px;
            height: calc(100vh - 125px);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            box-sizing: border-box;
            border-left: 1px solid #e8e8e8;
            border-right: 1px solid #e8e8e8;
        }
        .left-col::-webkit-scrollbar { display: none; }
        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            position: relative;
            overflow: hidden;
            background: #000;
            cursor: pointer;
        }
        .video-iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }
        .video-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.35);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: #fff;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .video-wrapper:hover .video-play-btn { opacity: 1; }
        .video-play-btn:hover { background: rgba(0,0,0,0.6); }
        .main-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
        }
        .info-block {
            padding: 30px calc(var(--margin-general) * 3) 30px var(--margin-general);
        }
        .info-block h1 { margin: 0 0 4px; }
        .info-block h2 { margin: 0 0 20px; }
        .info-block p  { margin: 0 0 10px; }
        .process-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: "IBM Plex Mono", monospace;
            font-style: italic;
            font-size: 10px;
            color: #aaa;
            letter-spacing: 0.08em;
            padding: 10px var(--margin-general);
            border: none;
            border-top: 1px solid #e8e8e8;
            border-bottom: 1px solid #e8e8e8;
            background: none;
            cursor: pointer;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            transition: color 0.2s;
        }
        .process-toggle:hover { color: #303030; background: #f5f5f5; }
        .process-toggle svg {
            flex-shrink: 0;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .process-toggle:hover svg { opacity: 1; }
        .process-toggle.open svg { transform: rotate(90deg); opacity: 0.5; }
        .process-toggle.icon-left {
            justify-content: flex-start;
            position: relative;
        }
        .process-toggle.icon-left svg {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
        }
        .process-toggle.icon-left.open svg {
            transform: translateY(-50%) rotate(90deg);
        }
        .expand-wrap {
            display: grid;
            grid-template-rows: 1fr;
            margin-top: -1px;
            transition: grid-template-rows 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.35s ease;
            opacity: 1;
        }
        .expand-wrap.collapsed {
            grid-template-rows: 0fr;
            opacity: 0;
        }
        .expand-inner {
            overflow: hidden;
            min-height: 0;
        }
        .process-inline-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-content: start;
        }
        .process-inline-grid img {
            display: block;
            width: 100%;
            height: auto;
            border-bottom: 1px solid #e8e8e8;
        }
        .process-inline-grid img:not(:nth-child(3n)) { border-right: 1px solid #e8e8e8; }
        .video-wrap {
            overflow: hidden;
            margin-top: -1px;
        }
        .right-col {
            flex: 1;
            position: sticky;
            top: 125px;
            height: calc(100vh - 125px);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            box-sizing: border-box;
            border-right: 1px solid #e8e8e8;
            isolation: isolate;
        }
        .right-col::-webkit-scrollbar { display: none; }

        /* ── Scrollbar custom (bord droit fenêtre) ── */
        #custom-scrollbar-track {
            position: fixed;
            right: 0;
            top: 125px;
            width: 6px;
            height: calc(100vh - 125px);
            z-index: 3000;
        }
        #custom-scrollbar-thumb {
            position: absolute;
            right: 0;
            width: 6px;
            background: #d0d0d0;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #custom-scrollbar-thumb:hover { background: #999; }
        .gallery-col-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: "IBM Plex Mono", monospace;
            font-style: italic;
            font-size: 10px;
            color: #aaa;
            letter-spacing: 0.08em;
            padding: 10px var(--margin-general);
            border-top: 1px solid #e8e8e8;
            border-bottom: 1px solid #e8e8e8;
            box-sizing: border-box;
            width: 100%;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 2200;
            cursor: pointer;
            border-left: none;
            border-right: none;
            transition: color 0.2s;
        }
        .gallery-col-header:hover { color: #303030; background: #f5f5f5; }
        .gallery-col-header svg {
            flex-shrink: 0;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gallery-col-header:hover svg { opacity: 1; }
        .gallery-col-header.open svg { transform: rotate(90deg); opacity: 0.5; }
        .gallery-img {
            display: block;
            width: 100%;
            height: auto;
            border-bottom: 1px solid #e8e8e8;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 2s ease;
        }
        .gallery-img.visible { opacity: 1; }
        #modelContainer {
            padding: 0 !important;
            box-sizing: border-box !important;
        }
        #modelContainer model-viewer {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        @media (max-width: 768px) {
            .page-layout { flex-direction: column; }
            .left-col { width: 100%; position: static; height: auto; overflow: visible; }
            .right-col { width: 100%; position: static; height: auto; overflow: visible; border-top: 1px solid #e8e8e8; }
        }
    </style>
</head>
<body>

<header>
    <div id="menu-placeholder"></div>
    <div id="svgmenupages-placeholder"></div>
</header>

<div id="app">
    <div class="page-layout">

        <!-- ── Colonne gauche ── -->
        <div class="left-col" ref="leftCol">

            <!-- 1. Vidéo ou image principale -->
            <template v-if="videoExists || mainImageExists">
                <button class="process-toggle icon-left" :class="{ open: videoVisible }" @click="videoVisible = !videoVisible">
                <svg width="7" height="9" viewBox="0 0 7 9" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M1.4 1.8C1.4 1.2 2 0.9 2.5 1.3L5.6 3.5C6.1 3.9 6.1 4.7 5.6 5.1L2.5 7.3C2 7.7 1.4 7.4 1.4 6.8Z"
                    fill="currentColor"
                />
                </svg>
                    cover
                </button>
                <div ref="videoWrapRef" class="video-wrap">
                    <template v-if="videoExists">
                        <div class="video-wrapper" @click="toggleVideoPlay">
                            <video ref="videoRef" class="video-iframe" :src="videoSrc" autoplay muted loop playsinline></video>
                            <button class="video-play-btn">
                                <svg v-if="videoPlaying" width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <rect x="1.5" y="1" width="3" height="9" rx="0.5" fill="currentColor"/>
                                    <rect x="6.5" y="1" width="3" height="9" rx="0.5" fill="currentColor"/>
                                </svg>
                                <svg v-else width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M2 1.5l8 4L2 9.5V1.5z" fill="currentColor"/>
                                </svg>
                            </button>
                        </div>
                    </template>
                    <template v-else>
                        <img :src="mainImageSrc" class="main-image"
                             :width="project.mainImage ? project.mainImage.w : undefined"
                             :height="project.mainImage ? project.mainImage.h : undefined"
                        />
                    </template>
                </div>
            </template>

            <!-- 2. Description -->
            <button class="process-toggle icon-left" :class="{ open: descVisible }" @click="descVisible = !descVisible">
                <svg width="7" height="9" viewBox="0 0 7 9" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M1.4 1.8C1.4 1.2 2 0.9 2.5 1.3L5.6 3.5C6.1 3.9 6.1 4.7 5.6 5.1L2.5 7.3C2 7.7 1.4 7.4 1.4 6.8Z"
                    fill="currentColor"
                />
                </svg>
                description
            </button>
            <div class="expand-wrap" :class="{ collapsed: !descVisible }">
                <div class="expand-inner">
                    <div class="info-block">
                        <h1 class="Title">{{ project.title }}</h1>
                        <h2 class="Subtitle">{{ project.subtitle }}</h2>
                        <main class="textebox-container">
                            <p v-if="project.dimensions" class="texte">{{ project.dimensions }}</p>
                            <p class="texte">{{ project.description }}</p>
                        </main>
                    </div>
                </div>
            </div>

            <!-- 3. 3D models -->
            <template v-if="hasModelsSection">
                <button class="process-toggle icon-left" :class="{ open: modelsVisible }" @click="modelsVisible = !modelsVisible">
                <svg width="7" height="9" viewBox="0 0 7 9" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M1.4 1.8C1.4 1.2 2 0.9 2.5 1.3L5.6 3.5C6.1 3.9 6.1 4.7 5.6 5.1L2.5 7.3C2 7.7 1.4 7.4 1.4 6.8Z"
                    fill="currentColor"
                />
                </svg>
                    3D models
                </button>
                <div class="expand-wrap" :class="{ collapsed: !modelsVisible }">
                    <div class="expand-inner">
                        <div class="info-block" style="padding-top: 20px; padding-bottom: 20px;">
                            <div class="sousmenu-wrapper" style="margin-top: 0;">
                                <div v-for="model in models" :key="model.src" class="icon-container">
                                    <a href="#" class="icon-link" @click.prevent.stop="openModel(model.src)">
                                        <img src="3DICON.svg" alt="Open Model Viewer" class="icon-item">
                                        <div class="texte texte-icon">{{ model.label }}</div>
                                    </a>
                                </div>
                                <div v-if="project.configurator" class="icon-container">
                                    <a :href="project.configurator" class="icon-link">
                                        <img src="config.svg" alt="Configurator" class="icon-item">
                                        <div class="texte texte-icon">3D configurator</div>
                                    </a>
                                </div>
                                <div v-if="project.download" class="icon-container">
                                    <a :href="project.download" class="icon-link" download>
                                        <img src="DL.svg" alt="Download" class="icon-item">
                                        <div class="texte texte-icon">HD images</div>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- 4. Process -->
            <template v-if="processExists">
                <button class="process-toggle icon-left" :class="{ open: processVisible }" @click="toggleProcess">
                <svg width="7" height="9" viewBox="0 0 7 9" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M1.4 1.8C1.4 1.2 2 0.9 2.5 1.3L5.6 3.5C6.1 3.9 6.1 4.7 5.6 5.1L2.5 7.3C2 7.7 1.4 7.4 1.4 6.8Z"
                    fill="currentColor"
                />
                </svg>
                    more details about the process
                </button>
                <div class="expand-wrap" :class="{ collapsed: !processVisible }">
                    <div class="expand-inner">
                        <div class="process-inline-grid">
                            <img v-for="(src, i) in processImages" :key="i" :src="src" :alt="`${project.title} process — Hugo Charlet`" />
                        </div>
                    </div>
                </div>
            </template>

        </div>

        <!-- ── Colonne droite : galerie ── -->
        <div class="right-col" ref="rightCol">
            <button class="gallery-col-header" :class="{ open: photosVisible }" @click="photosVisible = !photosVisible">
                photos
            </button>
            <div class="expand-wrap" :class="{ collapsed: !photosVisible }">
                <div class="expand-inner">
                    <img
                        v-for="(img, i) in images"
                        :key="i"
                        :src="img.src"
                        class="gallery-img"
                        :class="{ visible: img.visible }"
                        :alt="`${project.title} — Hugo Charlet`"
                        :width="img.w"
                        :height="img.h"
                        :loading="i === 0 ? 'eager' : 'lazy'"
                    />
                </div>
            </div>
        </div>

    </div>

    <!-- ── Model viewer overlay ── -->
    <div id="modelContainer" ref="modelContainer" :class="{ show: modelVisible }" @click.self="closeModel">
        <button class="close-button" @click="closeModel">
            <img src="crosss.svg" alt="Close">
        </button>
        <model-viewer
            ref="modelViewer"
            :src="currentModelSrc"
            autoplay loading="eager"
            ar ar-modes="webxr scene-viewer quick-look" ar-status="not-presenting"
            auto-rotate bounds="tight" rotation-per-second="1deg"
            environment-image="glb/studio.hdr" exposure="0.7"
            camera-controls interpolation-decay="200" shadow-intensity="1"
            interaction-prompt="none" camera-orbit="-40deg 82deg 12m"
            min-camera-orbit="auto 40deg a">
        </model-viewer>
    </div>

    <div id="loader" v-show="loading">
        <div class="spinner"></div>
    </div>
</div>

<script>
// PROJECTS and PROJECT_ORDER are loaded from projects-data.js

// ── Résolution du projet depuis l'URL ───────────────────────────────────────
const urlParams   = new URLSearchParams(window.location.search);
const lastSegment = window.location.pathname.split('/').filter(Boolean).pop() || '';
const fromPath    = lastSegment.endsWith('.html') ? null : lastSegment;
const projectKey  = urlParams.get('p') || fromPath || 'tomeo';
const project     = PROJECTS[projectKey] || {
    title: projectKey.toUpperCase(), subtitle: '', description: 'Project coming soon.',
    dimensions: null, pageTitle: projectKey, ogDescription: '', ogImage: '',
    models: [], configurator: null, download: null
};

// ── Meta tags ───────────────────────────────────────────────────────────────
document.title = project.pageTitle;
document.querySelector('meta[name="description"]').setAttribute('content', project.ogDescription);
document.querySelector('meta[property="og:description"]').setAttribute('content', project.ogDescription);
document.querySelector('meta[property="og:image"]').setAttribute('content', project.ogImage);

const canonical = document.createElement('link');
canonical.rel = 'canonical';
canonical.href = `https://hugocharlet.com/${projectKey}`;
document.head.appendChild(canonical);

// ── Navigation précédent / suivant (barre du haut) ──────────────────────────
const navsvg = document.getElementById("svgmenupages-placeholder");
(function () {
    const idx      = PROJECT_ORDER.indexOf(projectKey);
    const prevKey  = idx > 0 ? PROJECT_ORDER[idx - 1] : PROJECT_ORDER[PROJECT_ORDER.length - 1];
    const nextKey  = idx < PROJECT_ORDER.length - 1 ? PROJECT_ORDER[idx + 1] : PROJECT_ORDER[0];
    const prevTitle = (PROJECTS[prevKey] || {}).title || prevKey.toUpperCase();
    const nextTitle = (PROJECTS[nextKey] || {}).title || nextKey.toUpperCase();
    navsvg.innerHTML = `
        <nav class="proj-top-nav">
            <a class="proj-top-nav-link prev" href="/${prevKey}">
                <svg width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 5H2M5 1L1 5L5 9" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>${prevTitle}</span>
            </a>
            <a class="proj-top-nav-link next" href="/${nextKey}">
                <span>${nextTitle}</span>
                <svg width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 5H12M9 1L13 5L9 9" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </nav>`;
})();

// ── Vue app ──────────────────────────────────────────────────────────────────
const { createApp, ref, reactive, onMounted, nextTick, watch } = Vue;

const app = createApp({
    setup() {
        const newUrl       = `pages/${projectKey}/`;
        const videoSrc     = `${newUrl}main-video.mp4`;
        const mainImageSrc = `${newUrl}main.jpg`;

        const models           = project.models;
        const hasModelsSection = models.length > 0 || !!project.configurator || !!project.download;

        const modelVisible    = ref(false);
        const currentModelSrc = ref(models.length > 0 ? models[0].src : '');
        const loading         = ref(true);
        const images          = reactive([]);
        const processImages   = reactive([]);
        const processVisible  = ref(false);
        const processLoaded   = ref(false);
        const videoExists     = ref(false);
        const mainImageExists = ref(false);
        const processExists   = ref(false);
        const videoVisible    = ref(false);
        const descVisible     = ref(true);
        const modelsVisible   = ref(true);
        const photosVisible   = ref(true);
        const rightCol        = ref(null);
        const leftCol         = ref(null);
        const videoWrapRef    = ref(null);
        const videoRef        = ref(null);
        const videoPlaying    = ref(true);
        const modelContainer  = ref(null);

        function snapToInfoBlock() {
            if (!leftCol.value) return;
            const rect = leftCol.value.getBoundingClientRect();
            Object.assign(modelContainer.value.style, {
                position : "fixed",
                left     : rect.left   + "px",
                top      : rect.top    + "px",
                width    : rect.width  + "px",
                height   : rect.height + "px",
                right    : "auto",
                transform: "none",
                maxWidth : "none",
                padding  : "0",
            });
        }

        function openModel(src) {
            currentModelSrc.value = src;
            snapToInfoBlock();
            modelVisible.value = !modelVisible.value;
        }

        function closeModel() {
            modelVisible.value = false;
        }

        function toggleVideoPlay() {
            const v = videoRef.value;
            if (!v) return;
            if (videoPlaying.value) { v.pause(); videoPlaying.value = false; }
            else { v.play(); videoPlaying.value = true; }
        }

        async function toggleProcess() {
            if (!processVisible.value) {
                if (!processLoaded.value) {
                    processLoaded.value = true;
                    const base = `${newUrl}process/`;
                    const srcs = await Promise.all(
                        Array.from({ length: 30 }, (_, i) => new Promise(resolve => {
                            const img = new Image();
                            img.src = `${base}${i + 1}.jpg`;
                            img.onload  = () => resolve(img.src);
                            img.onerror = () => resolve(null);
                        }))
                    );
                    srcs.forEach(src => { if (src) processImages.push(src); });
                }
                processVisible.value = true;
                await nextTick();
                setTimeout(() => {
                    if (leftCol.value) {
                        const btns = leftCol.value.querySelectorAll('.process-toggle');
                        const processBtn = btns[btns.length - 1];
                        if (processBtn) {
                            leftCol.value.scrollTo({ top: processBtn.offsetTop, behavior: 'smooth' });
                        }
                    }
                }, 460);
            } else {
                processVisible.value = false;
            }
        }

        watch(videoVisible, (show) => {
            const el = videoWrapRef.value;
            if (!el) return;
            if (show) {
                el.style.height = 'auto';
                const h = el.getBoundingClientRect().height;
                el.style.height = '0';
                el.style.opacity = '0';
                el.offsetHeight;
                el.style.transition = 'height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
                el.style.height = h + 'px';
                el.style.opacity = '1';
                const onEnd = () => { el.style.height = 'auto'; el.style.transition = ''; el.removeEventListener('transitionend', onEnd); };
                el.addEventListener('transitionend', onEnd);
            } else {
                const h = el.getBoundingClientRect().height;
                el.style.height = h + 'px';
                el.offsetHeight;
                el.style.transition = 'height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
                el.style.height = '0';
                el.style.opacity = '0';
            }
        });

        onMounted(async () => {
            window.addEventListener("resize", () => {
                if (modelVisible.value) snapToInfoBlock();
            });

            document.addEventListener('click', (e) => {
                if (modelVisible.value && modelContainer.value && !modelContainer.value.contains(e.target)) {
                    modelVisible.value = false;
                }
            });

            // ── Détection vidéo ──
            fetch(`${newUrl}main-video.mp4`, { method: 'HEAD' })
                .then(async r => {
                    if (r.ok) {
                        videoExists.value = true;
                        await nextTick();
                        videoVisible.value = true;
                    } else {
                        fetch(`${newUrl}main.jpg`, { method: 'HEAD' })
                            .then(async r2 => {
                                if (r2.ok) {
                                    mainImageExists.value = true;
                                    await nextTick();
                                    videoVisible.value = true;
                                }
                            })
                            .catch(() => {});
                    }
                })
                .catch(() => {});

            // ── Détection dossier process ──
            new Promise(resolve => {
                const img = new Image();
                img.onload  = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = `${newUrl}process/1.jpg`;
            }).then(exists => { processExists.value = exists; });

            // ── Chargement galerie ──
            (project.gallery || []).forEach(({ w, h }, i) => {
                images.push({ src: `${newUrl}${i + 1}.jpg`, w, h, visible: false });
            });
            loading.value = false;

            await nextTick();

            // ── Fade-in images ──
            const galleryObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const idx = parseInt(entry.target.dataset.idx);
                    if (entry.isIntersecting) {
                        images[idx].visible = true;
                    } else if (entry.rootBounds && entry.boundingClientRect.top >= entry.rootBounds.bottom) {
                        images[idx].visible = false;
                    }
                });
            }, { root: rightCol.value, threshold: 0.05 });

            rightCol.value.querySelectorAll('.gallery-img').forEach((el, i) => {
                el.dataset.idx = i;
                galleryObserver.observe(el);
            });

            // ── Auto-scroll initial ──
            let autoScrollActive = true;
            const stopAuto = () => { autoScrollActive = false; };
            window.addEventListener('wheel',       stopAuto, { once: true });
            window.addEventListener('touchstart',  stopAuto, { once: true });
            window.addEventListener('pointerdown', stopAuto, { once: true });

            let last = null;
            const SPEED = 35;
            function step(ts) {
                if (!autoScrollActive) return;
                if (last === null) last = ts;
                const rc = rightCol.value;
                rc.scrollBy(0, SPEED * (ts - last) / 1000);
                last = ts;
                if (rc.scrollTop < rc.scrollHeight - rc.clientHeight) {
                    requestAnimationFrame(step);
                }
            }
            setTimeout(() => requestAnimationFrame(step), 1000);
        });

        return {
            project, models, hasModelsSection, videoSrc, mainImageSrc, mainImageExists,
            modelVisible, currentModelSrc, loading,
            images, processImages, processVisible, processExists,
            videoVisible, videoExists, descVisible, modelsVisible, photosVisible,
            rightCol, leftCol, videoWrapRef, videoRef, videoPlaying, modelContainer,
            openModel, closeModel, toggleProcess, toggleVideoPlay,
        };
    }
});

app.config.compilerOptions.isCustomElement = tag => tag === "model-viewer";
app.mount("#app");
</script>

<div id="custom-scrollbar-track">
    <div id="custom-scrollbar-thumb"></div>
</div>

<script>
(function () {
    const track = document.getElementById('custom-scrollbar-track');
    const thumb = document.getElementById('custom-scrollbar-thumb');

    function getRc() { return document.querySelector('.right-col'); }

    function updateThumb() {
        const rc = getRc();
        if (!rc || rc.scrollHeight <= rc.clientHeight) {
            thumb.style.display = 'none';
            return;
        }
        thumb.style.display = 'block';
        const ratio      = rc.clientHeight / rc.scrollHeight;
        const thumbH     = Math.max(ratio * rc.clientHeight, 28);
        const scrollable = rc.clientHeight - thumbH;
        const scrollRatio = rc.scrollTop / (rc.scrollHeight - rc.clientHeight);
        thumb.style.height = thumbH + 'px';
        thumb.style.top    = (scrollRatio * scrollable) + 'px';
    }

    // Sync on scroll
    function bindScroll() {
        const rc = getRc();
        if (!rc) { setTimeout(bindScroll, 100); return; }
        rc.addEventListener('scroll', updateThumb);
        updateThumb();
    }
    bindScroll();

    // Drag thumb
    let dragging = false, startY = 0, startScrollTop = 0;
    thumb.addEventListener('mousedown', (e) => {
        dragging = true;
        startY = e.clientY;
        startScrollTop = getRc().scrollTop;
        e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const rc = getRc();
        const thumbH  = thumb.offsetHeight;
        const range   = rc.clientHeight - thumbH;
        const delta   = ((e.clientY - startY) / range) * (rc.scrollHeight - rc.clientHeight);
        rc.scrollTop  = startScrollTop + delta;
    });
    document.addEventListener('mouseup', () => { dragging = false; });

    // Click on track
    track.addEventListener('click', (e) => {
        if (e.target === thumb) return;
        const rc   = getRc();
        const rect = track.getBoundingClientRect();
        const ratio = (e.clientY - rect.top) / rect.height;
        rc.scrollTop = ratio * (rc.scrollHeight - rc.clientHeight);
    });

    // Update on resize
    window.addEventListener('resize', updateThumb);
})();
</script>
